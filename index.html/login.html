<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com https://unpkg.com https://maps.google.com https://www.google.com; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; img-src 'self' data: https://*; font-src https://fonts.googleapis.com https://fonts.gstatic.com; frame-src https://www.google.com https://maps.google.com https://google.com; connect-src 'self' https://*; object-src 'none'; base-uri 'self';">
  <title>Admin Login | LifeDrop Blood Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: #fff0f0; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); width: min(420px, 90%); }
    h1 { color: #d32f2f; margin-bottom: 1rem; }
    label { display: block; margin: 1rem 0 0.5rem; font-weight: 600; }
    input { width: 100%; padding: 0.9rem 1rem; border: 1px solid #ccc; border-radius: 10px; }
    button { margin-top: 1.5rem; width: 100%; padding: 0.9rem; border: none; border-radius: 10px; background: #d32f2f; color: white; font-weight: 700; cursor: pointer; }
    button:hover { background: #b71c1c; }
    .nav-link { display: inline-block; margin-top: 1rem; color: #d32f2f; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" required />
      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" required />
      <button type="submit">Sign In</button>
    </form>
    <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
  </div>
  <script src="js/api.js"></script>
</body>
</html>
